<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ليالي الطيبين | استبانة تشخيص الواقع</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: #f1f5f9; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gold-text { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-style { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(251, 191, 36, 0.2); border-radius: 12px; padding: 12px; font-size: 0.8rem; width: 100%; outline: none; transition: 0.3s; }
        .input-style:focus { border-color: #fbbf24; box-shadow: 0 0 10px rgba(251, 191, 36, 0.1); }
    </style>
</head>
<body class="py-12 px-4">

    <div class="max-w-3xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-3xl font-bold gold-text mb-2">استمارة تشخيص الواقع</h1>
            <p class="text-slate-400 text-sm italic underline decoration-amber-900">ليالي الطيبين - الاستراتيجية الرقمية</p>
        </header>

        <form action="رابط_قوقل_فورم_الجديد_هنا" class="space-y-6">
            
            <!-- مصفوفة الأسئلة -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- الإشراف -->
                <div class="glass-card p-6 rounded-2xl">
                    <label class="block text-xs text-amber-400 mb-2 font-bold italic underline">1. الإشراف اليومي:</label>
                    <input type="text" placeholder="هل تشرفون على المطعم يومياً؟" class="input-style">
                </div>
                <!-- المنافسين -->
                <div class="glass-card p-6 rounded-2xl">
                    <label class="block text-xs text-amber-400 mb-2 font-bold italic underline">2. المنافسون في المنطقة:</label>
                    <input type="text" placeholder="اذكر أسماء المنافسين.." class="input-style">
                </div>
                <!-- الدخل -->
                <div class="glass-card p-6 rounded-2xl">
                    <label class="block text-xs text-amber-400 mb-2 font-bold italic underline">3. الدخل اليومي التقريبي:</label>
                    <input type="text" placeholder="الرقم يساعدنا في قياس النمو.." class="input-style">
                </div>
                <!-- المنتج النجم -->
                <div class="glass-card p-6 rounded-2xl">
                    <label class="block text-xs text-amber-400 mb-2 font-bold italic underline">4. المنتج الأعلى طلباً:</label>
                    <input type="text" placeholder="ما هو طبقك النجم؟" class="input-style">
                </div>
            </div>

            <!-- سؤال التجربة السابقة -->
            <div class="glass-card p-6 rounded-2xl">
                <label class="block text-xs text-amber-400 mb-2 font-bold italic underline">5. الأثر الملموس للمؤثرين سابقاً:</label>
                <textarea rows="3" class="input-style" placeholder="صف تجربتك مع الحملات السابقة.."></textarea>
            </div>

            <!-- زر الإرسال -->
            <div class="text-center pt-8">
                <button type="submit" class="bg-gradient-to-r from-amber-500 to-amber-700 text-slate-900 font-bold py-4 px-12 rounded-full shadow-2xl hover:scale-105 transition-all italic">
                    إرسال كافة البيانات للاعتماد 🚀
                </button>
            </div>
        </form>
    </div>

</body>
</html>
