<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استبانة الطريق للتسويق - ليالي الطيبين</title>
    <!-- استدعاء مكتبة بوتستراب للتنسيق الاحترافي -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .form-container {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-top: 50px;
            margin-bottom: 50px;
            padding: 20px;
            overflow: hidden;
        }
        .iframe-wrapper {
            position: relative;
            width: 100%;
            /* تقليل الارتفاع في الكود ليكون أكثر انسيابية مع التمرير */
            height: 1500px; 
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .header-section {
            text-align: center;
            padding: 30px 0;
            background: #343a40;
            color: white;
            border-radius: 15px 15px 0 0;
            margin: -20px -20px 20px -20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8 form-container">
            <!-- رأس الصفحة -->
            <div class="header-section">
                <h2 class="fw-bold">استبانة تشخيص واقع المطعم</h2>
                <p class="mb-0">مطعم ليالي الطيبين - نحو رؤية تسويقية متكاملة</p>
            </div>

            <!-- تضمين نموذج قوقل -->
            <div class="iframe-wrapper">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfZ-RGGrG_bAfda3yca-sM9ZIFG6JGIHcQz16lWuRMvN87Egw/viewform?embedded=true" 
                        frameborder="0" 
                        marginheight="0" 
                        marginwidth="0">
                    جارٍ التحميل…
                </iframe>
            </div>
            
            <div class="text-center mt-3 text-muted">
                <small>جميع البيانات المشتركة تعامل بسرية تامة لأغراض التطوير التسويقي.</small>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
