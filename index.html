<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحليل المطعم</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Tajawal';
    background: linear-gradient(135deg,#4f46e5,#7c3aed);
    color: white;
}

.screen {
    display: none;
    height: 100vh;
    padding: 25px;
}

.active {
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.choice {
    background: white;
    color: black;
    padding: 18px;
    border-radius: 15px;
    margin-top: 10px;
    text-align: center;
    cursor: pointer;
}

.choice:hover { background: #e0e7ff; }

input { display:none; }

.progress {
    position: fixed;
    top:0;
    right:0;
    height:5px;
    background:white;
    width:0%;
}

.textbox {
    padding:15px;
    border-radius:10px;
    color:black;
    width:100%;
    margin-top:15px;
}

.btn {
    margin-top:20px;
    background:black;
    padding:15px;
    border-radius:12px;
    text-align:center;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="progress" id="progress"></div>

<iframe name="hidden_iframe" style="display:none;" onload="done()"></iframe>

<form id="form"
action="https://docs.google.com/forms/d/e/1FAIpQLSfZ-RGGrG_bAfda3yca-sM9ZIFG6JGIHcQz16lWuRMvN87Egw/formResponse"
method="POST"
target="hidden_iframe">

<!-- 1 -->
<div class="screen active">
<h2>ما هو المؤشر الحقيقي للنجاح؟</h2>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.1099859393" value="1- نمو المبيعات اليومية ودخل الصندوق بشكل واضح ومستمر." required>نمو المبيعات
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.1099859393" value="2- استقطاب زبائن جدد من سكان الحي لم يسبق لهم التجربة.">عملاء جدد
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.1099859393" value="3- السيطرة الرقمية وتصدر نتائج البحث في تطبيقات التوصيل.">السيطرة الرقمية
</label>
</div>

<!-- 2 -->
<div class="screen">
<h2>العائق الأكبر؟</h2>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.1095069852" value="1- نقص أو عدم استقرار العمالة." required>العمالة
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.1095069852" value="2- تذبذب جودة المواد الخام والموردين.">الموردين
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.1095069852" value="3- ارتفاع تكاليف التشغيل مقارنة بالربح.">التكاليف
</label>
</div>

<!-- 3 -->
<div class="screen">
<h2>الميزانية؟</h2>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.1005025151" value="1- أقل من 2000 ريال." required>أقل من 2000
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.1005025151" value="2- من 2000 إلى 5000 ريال.">2000 - 5000
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.1005025151" value="3- أكثر من 5000 ريال.">أكثر من 5000
</label>
</div>

<!-- 4 -->
<div class="screen">
<h2>نجم المطعم</h2>
<input class="textbox" name="entry.1276136133" required>
<div class="btn" onclick="next()">التالي</div>
</div>

<!-- 5 -->
<div class="screen">
<h2>جودة الخدمة</h2>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.997508088" value="ضعيفة" required>ضعيفة
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.997508088" value="جيدة">جيدة
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.997508088" value="جيد جداً">جيد جداً
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.997508088" value="ممتازة">ممتازة
</label>
</div>

<!-- 6 -->
<div class="screen">
<h2>الحضور الرقمي</h2>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.391544910" value="1- ضعيف جداً (أو غير موجود)." required>ضعيف
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.391544910" value="2- متوسط (نشر متقطع وغير منظم).">متوسط
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.391544910" value="3- جيد (يوجد تفاعل ولكن يحتاج احترافية).">جيد
</label>
</div>

<!-- 7 -->
<div class="screen">
<h2>الحي المستهدف</h2>
<input class="textbox" name="entry.456560046" required>
<div class="btn" onclick="next()">التالي</div>
</div>

<!-- 8 -->
<div class="screen">
<h2>الجمهور</h2>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.1554988620" value="1- أفراد (شباب وموظفون)." required>أفراد
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.1554988620" value="2- عوائل (طلبات كبيرة وتجمعات).">عوائل
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.1554988620" value="3- خليط متساوٍ بين النوعين.">مزيج
</label>
</div>

<!-- 9 -->
<div class="screen">
<h2>الميزة التنافسية</h2>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.1678168052" value="1- الجودة العالية والمذاق الأصيل." required>الجودة
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.1678168052" value="2- السعر المنافس والمناسب للجميع.">السعر
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.1678168052" value="3- سرعة التوصيل والخدمة.">السرعة
</label>
</div>

<!-- 10 -->
<div class="screen">
<h2>الفئة العمرية</h2>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.1051615624" value="1- مراهقين وطلاب." required>طلاب
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.1051615624" value="2- شباب (أفراد ومجموعات صغيرة).">شباب
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.1051615624" value="3- كبار سن وعائلات.">عوائل
</label>
</div>

<!-- 11 -->
<div class="screen">
<h2>أفضل منصة</h2>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.745744296" value="1- تيك توك." required>تيك توك
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.745744296" value="2- سناب شات.">سناب
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.745744296" value="3- انستقرام.">انستقرام
</label>
</div>

<!-- 12 -->
<div class="screen">
<h2>التجارب السابقة</h2>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.834087530" value="1- نعم، ولدي خبرة جيدة بالنتائج." required>ناجحة
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.834087530" value="2- نعم، ولكن النتائج لم تكن مرضية.">ضعيفة
</label>
<label class="choice" onclick="next(this)">
<input type="radio" name="entry.834087530" value="3- لا، ستكون هذه المرة الأولى.">أول مرة
</label>
</div>

<!-- إرسال -->
<div class="screen">
<h2>إرسال النموذج</h2>
<div class="btn" onclick="document.getElementById('form').submit()">إرسال</div>
</div>

</form>

<script>
let current = 0;
let screens = document.querySelectorAll(".screen");

function next(el){
    if(el){ el.querySelector("input").checked = true; }
    screens[current].classList.remove("active");
    current++;
    if(current < screens.length){
        screens[current].classList.add("active");
        document.getElementById("progress").style.width = (current/screens.length)*100+"%";
    }
}

function done(){
    document.body.innerHTML="<h1 style='text-align:center;margin-top:40%'>✅ تم الإرسال</h1>";
}
</script>

</body>
</html>
