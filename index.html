<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الطريق للتسويق | مطعم ليالي الطيبين</title>
    <style>
        /* التنسيق العام المستوحى من تصاميمك السابقة */
        body {
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        .card-wrapper {
            width: 95%;
            max-width: 900px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            margin: 40px 0;
        }
        .header-bar {
            background: linear-gradient(135deg, #1a1a1a 0%, #333333 100%);
            color: #d4af37; /* لون ذهبي خفيف للفخامة */
            padding: 30px;
            text-align: center;
            border-bottom: 4px solid #d4af37;
        }
        .header-bar h1 { margin: 0; font-size: 24px; }
        .header-bar p { margin: 10px 0 0; color: #eee; font-size: 14px; }
        
        .iframe-container {
            position: relative;
            width: 100%;
            height: 3300px; /* الارتفاع الذي حددته في النموذج */
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div class="card-wrapper">
    <div class="header-bar">
        <h1>خطة الطريق للتسويق</h1>
        <p>الاستبانة التشخيصية لمطعم ليالي الطيبين</p>
    </div>
    
    <div class="iframe-container">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfZ-RGGrG_bAfda3yca-sM9ZIFG6JGIHcQz16lWuRMvN87Egw/viewform?embedded=true">
            جارٍ التحميل…
        </iframe>
    </div>
</div>

</body>
</html>
