<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تشخيص مطعم</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#0f172a; color:white; font-family:sans-serif;}
.card{background:#111827; padding:20px; border-radius:16px;}
.step{display:none;}
.step.active{display:block;}
.btn{background:#f59e0b;color:black;padding:12px;border-radius:10px;width:100%;margin-top:10px;font-weight:bold;}
input,select{background:#0b1220;border:1px solid #334155;color:white;padding:10px;border-radius:10px;width:100%;margin-top:10px;}
.progress{height:6px;background:#f59e0b;width:0%;}
</style>
</head>

<body class="p-4">

<div class="max-w-xl mx-auto">

<div class="w-full bg-gray-700 rounded mb-5">
<div class="progress" id="progress"></div>
</div>

<form action="https://docs.google.com/forms/d/e/PUT-YOUR-ID-HERE/formResponse"
method="POST" target="hidden_iframe" onsubmit="submitted=true;">

<!-- 1 -->
<div class="step active card">
<h3>📌 معلومات عامة</h3>
<input name="entry.1" placeholder="اسم المطعم">
<input name="entry.2" placeholder="المدينة">
<select name="entry.3">
<option>شعبي</option>
<option>وجبات سريعة</option>
<option>كوفي</option>
<option>راقي</option>
</select>
<button type="button" class="btn" onclick="next()">التالي</button>
</div>

<!-- 2 -->
<div class="step card">
<h3>📊 الأداء</h3>
<input name="entry.4" placeholder="المبيعات اليومية">
<input name="entry.5" placeholder="عدد العملاء يوميًا">
<select name="entry.6">
<option>ثابتة</option>
<option>تنخفض</option>
<option>ترتفع</option>
</select>
<button type="button" class="btn" onclick="next()">التالي</button>
<button type="button" class="btn" onclick="back()">رجوع</button>
</div>

<!-- 3 -->
<div class="step card">
<h3>🍽️ المنتج</h3>
<input name="entry.7" placeholder="أكثر 3 أطباق مبيعًا">
<select name="entry.8">
<option>نعم طبق مميز</option>
<option>لا يوجد</option>
</select>
<select name="entry.9">
<option>يوجد أطباق لا تُطلب</option>
<option>لا</option>
</select>
<button type="button" class="btn" onclick="next()">التالي</button>
<button type="button" class="btn" onclick="back()">رجوع</button>
</div>

<!-- 4 -->
<div class="step card">
<h3>👥 العملاء</h3>
<select name="entry.10">
<option>جدد</option>
<option>مكررين</option>
<option>الاثنين</option>
</select>
<select name="entry.11">
<option>نعم يعودون</option>
<option>لا</option>
<option>أحيانًا</option>
</select>
<select name="entry.12">
<option>سريع</option>
<option>متوسط</option>
<option>بطيء</option>
</select>
<button type="button" class="btn" onclick="next()">التالي</button>
<button type="button" class="btn" onclick="back()">رجوع</button>
</div>

<!-- 5 -->
<div class="step card">
<h3>🏪 التشغيل</h3>
<select name="entry.13">
<option>ضعيف</option>
<option>متوسط</option>
<option>ممتاز</option>
</select>
<select name="entry.14">
<option>يوجد تأخير</option>
<option>لا يوجد</option>
</select>
<select name="entry.15">
<option>نظافة ضعيفة</option>
<option>متوسطة</option>
<option>ممتازة</option>
</select>
<button type="button" class="btn" onclick="next()">التالي</button>
<button type="button" class="btn" onclick="back()">رجوع</button>
</div>

<!-- 6 -->
<div class="step card">
<h3>📣 التسويق</h3>
<select name="entry.16">
<option>يوجد تسويق</option>
<option>لا يوجد</option>
</select>
<select name="entry.17">
<option>تيك توك</option>
<option>سناب</option>
<option>انستقرام</option>
<option>لا يوجد</option>
</select>
<select name="entry.18">
<option>أقل من 2000</option>
<option>2000-5000</option>
<option>أكثر من 5000</option>
</select>
<button type="button" class="btn" onclick="next()">التالي</button>
<button type="button" class="btn" onclick="back()">رجوع</button>
</div>

<!-- 7 -->
<div class="step card">
<h3>📍 الموقع والمنافسة</h3>
input name="entry.19" placeholder="المنافسين">
<input name="entry.20" placeholder="لماذا يختارك العميل؟">
<button type="button" class="btn" onclick="next()">التالي</button>
<button type="button" class="btn" onclick="back()">رجوع</button>
</div>

<!-- 8 -->
<div class="step card">
<h3>🔁 المشاكل</h3>
<input name="entry.21" placeholder="أكبر مشكلة">
<input name="entry.22" placeholder="ما الذي تريد تحسينه فورًا">
<button class="btn" type="submit">🚀 إرسال</button>
<button type="button" class="btn" onclick="back()">رجوع</button>
</div>

</form>

<iframe name="hidden_iframe" style="display:none;" onload="if(submitted){alert('تم الإرسال')}"></iframe>

</div>

<script>
let i=0;
let steps=document.querySelectorAll(".step");
let submitted=false;

function show(){
steps.forEach(s=>s.classList.remove("active"));
steps[i].classList.add("active");
document.getElementById("progress").style.width=((i+1)/steps.length)*100+"%";
}

function next(){ if(i<steps.length-1){i++;show();} }
function back(){ if(i>0){i--;show();} }

show();
</script>

</body>
</html>
