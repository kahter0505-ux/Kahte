<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استمارة تشخيص واقع ليالي الطيبين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #e6edf3; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .glass-card { background: rgba(22, 27, 34, 0.8); border: 1px solid #30363d; border-radius: 12px; height: 100%; transition: 0.3s; }
        .glass-card:hover { border-color: #d29922; }
        .input-field { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; transition: 0.3s; width: 100%; padding: 12px; border-radius: 8px; appearance: none; }
        .input-field:focus { border-color: #58a6ff; outline: none; box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1); }
        .label-gold { color: #d29922; font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 8px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-yellow-500 mb-2">استمارة تشخيص الواقع</h1>
            <p class="text-gray-400 text-sm italic underline">مطعم ليالي الطيبين - الاستراتيجية الرقمية</p>
        </div>

        <form action="https://docs.google.com/forms/d/e/1FAIpQLSfZ-RGGrG_bAfda3yca-sM9ZIFG6JGIHcQz16lWuRMvN87Egw/formResponse" method="POST">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <!-- السؤال 1: خيارات -->
                <div class="glass-card p-6">
                    <label class="label-gold">1. مؤشر النجاح المالي بعد 60 يوماً:</label>
                    <select name="entry.1090412351" class="input-field">
                        <option value="" disabled selected>اختر المؤشر...</option>
                        <option value="1- نمو المبيعات اليومية ودخل الصندوق بشكل واضح ومستمر.">1- نمو المبيعات اليومية</option>
                        <option value="2- استقطاب زبائن جدد من سكان الحي لم يسبق لهم التجربة.">2- استقطاب زبائن جدد</option>
                        <option value="3- السيطرة الرقمية وتصدر نتائج البحث في تطبيقات التوصيل.">3- السيطرة الرقمية</option>
                        <option value="4- تنشيط المبيعات في الفترات الراكدة لرفع الكفاءة التشغيلية.">4- تنشيط المبيعات</option>
                    </select>
                </div>

                <!-- السؤال 2: خيارات -->
                <div class="glass-card p-6">
                    <label class="label-gold">2. العائق التشغيلي الأكبر حالياً:</label>
                    <select name="entry.1598282361" class="input-field">
                        <option value="" disabled selected>اختر العائق...</option>
                        <option value="1- نقص أو عدم استقرار العمالة.">1- نقص العمالة</option>
                        <option value="2- تذبذب جودة المواد الخام والموردين.">2- جودة المواد</option>
                        <option value="3- بطء في تجهيز الطلبات وتسليمها.">3- بطء التجهيز</option>
                        <option value="4- الحاجة لصيانة أو تحديث في مرافق المطعم.">4- حاجة للصيانة</option>
                    </select>
                </div>

                <!-- السؤال 10: خيارات (المنصات الرقمية) -->
                <div class="glass-card p-6">
                    <label class="label-gold">10. أي منصة رقمية تشعر أنها تجلب زبائن حقيقيين؟</label>
                    <select name="entry.XXXX10" class="input-field">
                        <option value="" disabled selected>اختر المنصة...</option>
                        <option value="1- تيك توك.">1- تيك توك</option>
                        <option value="2- سناب شات.">2- سناب شات</option>
                        <option value="3- انستقرام.">3- انستقرام</option>
                        <option value="4- قوقل ماب (الخرائط والتقييمات).">4- قوقل ماب</option>
                        <option value="5- لا يوجد تأثير واضح لأي منصة حالياً.">5- لا يوجد تأثير</option>
                    </select>
                </div>

                <!-- السؤال 12: خيارات -->
                <div class="glass-card p-6">
                    <label class="label-gold">12. هل لديك تجارب سابقة في التسويق الإلكتروني؟</label>
                    <select name="entry.XXXX12" class="input-field">
                        <option value="" disabled selected>اختر تجربتك...</option>
                        <option value="1- نعم، ولدي خبرة جيدة بالنتائج.">1- نعم، بخبرة جيدة</option>
                        <option value="2- نعم، تجارب بسيطة وغير مستمرة.">2- تجارب بسيطة</option>
                        <option value="3- لا، هذه هي التجربة الأولى للمطعم.">3- لا، تجربة أولى</option>
                    </select>
                </div>

                <!-- حقول نصية (س3 و س4) -->
                <div class="glass-card p-6">
                    <label class="label-gold">3. الميزانية الشهرية للتسويق:</label>
                    <input type="text" name="entry.1116664973" class="input-field" placeholder="حدد المبلغ التقريبي">
                </div>

                <div class="glass-card p-6">
                    <label class="label-gold">4. المنتج الأعلى طلباً (النجم):</label>
                    <input type="text" name="entry.135246757" class="input-field" placeholder="اسم الصنف">
                </div>

                <!-- حقل الملاحظات (عرض كامل) -->
                <div class="glass-card p-6 md:col-span-2">
                    <label class="label-gold">11. ملاحظات إضافية حول السمعة الرقمية:</label>
                    <textarea name="entry.1362751433" rows="3" class="input-field" placeholder="اكتب مرئياتك هنا..."></textarea>
                </div>

            </div>

            <div class="mt-12 text-center pb-20">
                <button type="submit" class="bg-gradient-to-r from-orange-500 to-yellow-600 hover:from-orange-600 hover:to-yellow-700 text-white font-bold py-4 px-16 rounded-full shadow-2xl transform transition hover:scale-105 text-lg">
                    ارسال كافة البيانات للاعتماد 🚀
                </button>
            </div>
        </form>
    </div>

</body>
</html>
