<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ليالي الطيبين | استبانة تشخيص الواقع</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f1f5f9; overflow-x: hidden; }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .glass-card:hover { border-color: rgba(251, 191, 36, 0.3); transform: translateY(-2px); }
        .gold-gradient { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-field { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(251, 191, 36, 0.1); border-radius: 10px; padding: 14px; width: 100%; color: white; outline: none; font-size: 0.9rem; }
        .input-field:focus { border-color: #fbbf24; box-shadow: 0 0 15px rgba(251, 191, 36, 0.1); }
        #successMessage { display: none; }
    </style>
</head>
<body class="py-10 px-4 md:px-0">

    <div class="max-w-4xl mx-auto">
        <!-- ترويسة الموقع -->
        <header class="text-center mb-10">
            <h1 class="text-3xl font-extrabold gold-gradient italic mb-3">ليالي الطيبين</h1>
            <div class="inline-block px-4 py-1 rounded-full border border-amber-900/50 bg-amber-900/10">
                <span class="text-[10px] text-amber-500 font-bold tracking-widest italic uppercase">استمارة تشخيص الواقع الاستراتيجي 2026</span>
            </div>
        </header>

        <!-- نافذة الإرسال المخفية (لمنع خروج العميل من الصفحة) -->
        <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) {showSuccess();}"></iframe>

        <!-- النموذج الرئيسي -->
        <form id="auditForm" action="https://docs.google.com/forms/d/e/1FAIpQLSfZ-RGGrG_bAfda3yca-sM9ZIFG6JGIHcQz16lWuRMvN87Egw/formResponse" method="POST" target="hidden_iframe" onsubmit="submitted=true;" class="space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- مجموعة الأسئلة -->
                <div class="glass-card p-6 rounded-2xl">
                    <label class="block text-xs text-slate-400 mb-2 italic">1. الإشراف اليومي:</label>
                    <input type="text" name="entry.1276136133" placeholder="هل تشرفون على المطعم يومياً؟" class="input-field" required>
                </div>

                <div class="glass-card p-6 rounded-2xl">
                    <label class="block text-xs text-slate-400 mb-2 italic">2. المنافسون في المنطقة:</label>
                    <input type="text" name="entry.1005025151" placeholder="أبرز المطاعم المنافسة حالياً.." class="input-field" required>
                </div>

                <div class="glass-card p-6 rounded-2xl">
                    <label class="block text-xs text-slate-400 mb-2 italic">3. الدخل الشهري المستهدف:</label>
                    <input type="text" name="entry.1099859393" placeholder="الميزانية المرصودة للتطوير.." class="input-field" required>
                </div>

                <div class="glass-card p-6 rounded-2xl">
                    <label class="block text-xs text-slate-400 mb-2 italic">4. تقييم جودة الخدمة:</label>
                    <input type="text" name="entry.997508088" placeholder="رضا العملاء (جيد، ممتاز، يحتاج تطوير).." class="input-field" required>
                </div>
            </div>

            <div class="glass-card p-6 rounded-2xl">
                <label class="block text-xs text-slate-400 mb-2 italic">5. تفاصيل إضافية عن أثر المؤثرين سابقاً:</label>
                <textarea name="entry.1678168052" rows="3" placeholder="صف تجربتك مع الحملات الإعلانية السابقة بكل شفافية.." class="input-field" required></textarea>
            </div>

            <div class="text-center pt-6">
                <button type="submit" class="bg-gradient-to-r from-amber-500 to-amber-700 text-slate-900 font-bold py-4 px-16 rounded-full shadow-2xl hover:scale-105 transition-all italic text-lg">
                    إرسال كافة البيانات للاعتماد 🚀
                </button>
            </div>
        </form>

        <!-- رسالة النجاح (تظهر بدل النموذج بعد الإرسال) -->
        <div id="successMessage" class="text-center py-20 glass-card rounded-3xl animate-pulse">
            <div class="text-6xl mb-6">✅</div>
            <h2 class="text-2xl font-bold gold-gradient italic mb-2">تم استلام بياناتك بنجاح</h2>
            <p class="text-slate-400 italic">سيتم ترحيل البيانات إلى لوحة التحكم الإدارية فوراً.</p>
        </div>
    </div>

    <script>
        var submitted = false;
        function showSuccess() {
            document.getElementById('auditForm').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
        }
    </script>
</body>
</html>
