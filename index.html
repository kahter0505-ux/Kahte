<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تقييم المطعم</title>

<style>
body {
    font-family: Tahoma;
    background: linear-gradient(135deg, #eef2f3, #dfe9f3);
    padding: 20px;
}

.container {
    max-width: 750px;
    margin: auto;
    background: #fff;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 25px;
}

.question {
    margin-bottom: 20px;
}

label {
    display: block;
    margin: 6px 0;
    cursor: pointer;
}

input[type="text"] {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 15px;
    background: #27ae60;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}

button:hover {
    background: #1e8449;
}
</style>

</head>

<body>

<div class="container">
<h2>نموذج تقييم المطعم</h2>

<form action="https://docs.google.com/forms/d/e/1FAIpQLSfZ-RGGrG_bAfda3yca-sM9ZIFG6JGIHcQz16lWuRMvN87Egw/formResponse" method="POST" target="_blank">

<!-- الميزانية -->
<div class="question">
<p>ما هي الميزانية الشهرية للتسويق؟</p>
<label><input type="radio" name="entry.1005025151" value="أقل من 2000 ريال"> أقل من 2000</label>
<label><input type="radio" name="entry.1005025151" value="من 2000 إلى 5000 ريال"> 2000 - 5000</label>
<label><input type="radio" name="entry.1005025151" value="أكثر من 5000 ريال"> أكثر من 5000</label>
</div>

<!-- نجم المطعم -->
<div class="question">
<p>ما هو الصنف الذي يعتبرونه "نجم المطعم"؟</p>
<input type="text" name="entry.1276136133" placeholder="اكتب الإجابة هنا">
</div>

<!-- التقييم -->
<div class="question">
<p>تقييم خدمة العملاء:</p>
<label><input type="radio" name="entry.997508088" value="ضعيفة"> ضعيفة</label>
<label><input type="radio" name="entry.997508088" value="جيدة"> جيدة</label>
<label><input type="radio" name="entry.997508088" value="جيد جداً"> جيد جداً</label>
<label><input type="radio" name="entry.997508088" value="ممتازة"> ممتازة</label>
</div>

<!-- الحضور الرقمي -->
<div class="question">
<p>كيف تصف حضورك في السوشيال ميديا؟</p>
<label><input type="radio" name="entry.391544910" value="ضعيف"> ضعيف</label>
<label><input type="radio" name="entry.391544910" value="متوسط"> متوسط</label>
<label><input type="radio" name="entry.391544910" value="قوي"> قوي</label>
</div>

<!-- زر الإرسال -->
<button type="submit">إرسال الإجابات</button>

</form>
</div>

</body>
</html>
