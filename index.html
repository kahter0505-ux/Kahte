<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ليالي الطيبين | استبانة التميز</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Almarai', sans-serif; background-color: #fcfaf7; color: #4a3f35; }
        .white-card { background: #ffffff; border: 1px solid #eee6de; box-shadow: 0 10px 30px rgba(74, 63, 53, 0.05); transition: all 0.4s ease; }
        .white-card:hover { box-shadow: 0 15px 40px rgba(217, 119, 6, 0.1); border-color: #d97706; }
        .gold-button { background: linear-gradient(135deg, #d97706 0%, #b45309 100%); color: white; }
        .input-elegant { background: #fdfdfd; border: 1px solid #e5e7eb; border-radius: 8px; padding: 14px; width: 100%; color: #4a3f35; outline: none; transition: 0.3s; }
        .input-elegant:focus { border-color: #d97706; background: #fff; }
        #successSection { display: none; }
    </style>
</head>
<body class="py-16 px-6">

    <div class="max-w-3xl mx-auto">
        <!-- الهوية الجديدة المشرقة -->
        <header class="text-center mb-16">
            <h1 class="text-4xl font-bold text-[#b45309] tracking-tight mb-4">ليالي الطيبين</h1>
            <p class="text-gray-500 font-light text-lg">استمارة تشخيص الواقع وتطوير التجربة</p>
            <div class="w-20 h-1 bg-[#d97706] mx-auto mt-4 rounded-full opacity-30"></div>
        </header>

        <iframe name="hidden_frame" id="hidden_iframe" style="display:none;" onload="if(submitted) {showSuccess();}"></iframe>

        <form id="auditForm" action="https://docs.google.com/forms/d/e/1FAIpQLSfZ-RGGrG_bAfda3yca-sM9ZIFG6JGIHcQz16lWuRMvN87Egw/formResponse" method="POST" target="hidden_iframe" onsubmit="submitted=true;" class="space-y-8">
            
            <div class="grid grid-cols-1 gap-8">
                <!-- السؤال 1 -->
                <div class="white-card p-8 rounded-2xl">
                    <label class="block text-sm font-bold text-gray-700 mb-3">1. هل تشرفون على المطعم بشكل يومي؟</label>
                    <input type="text" name="entry.1276136133" placeholder="اكتب ملاحظتك هنا.." class="input-elegant" required>
                </div>

                <!-- السؤال 2 -->
                <div class="white-card p-8 rounded-2xl">
                    <label class="block text-sm font-bold text-gray-700 mb-3">2. من هم المنافسون الأقوى في منطقتك حالياً؟</label>
                    <input type="text" name="entry.1005025151" placeholder="أسماء المطاعم المنافسة.." class="input-elegant" required>
                </div>

                <!-- السؤال 3 -->
                <div class="white-card p-8 rounded-2xl">
                    <label class="block text-sm font-bold text-gray-700 mb-3">3. الميزانية الشهرية المرصودة للتسويق؟</label>
                    <input type="text" name="entry.1099859393" placeholder="مثلاً: 2000 - 5000 ريال.." class="input-elegant" required>
                </div>

                <!-- السؤال 4 -->
                <div class="white-card p-8 rounded-2xl">
                    <label class="block text-sm font-bold text-gray-700 mb-3">4. كيف تقيم جودة الخدمة الحالية؟</label>
                    <input type="text" name="entry.997508088" placeholder="ممتاز، جيد، يحتاج تحسين.." class="input-elegant" required>
                </div>

                <!-- السؤال 5 -->
                <div class="white-card p-8 rounded-2xl">
                    <label class="block text-sm font-bold text-gray-700 mb-3">5. تجربتك السابقة مع "المؤثرين" (المشاهير)؟</label>
                    <textarea name="entry.1678168052" rows="4" placeholder="هل كانت النتيجة مرضية؟ صف لنا الأثر.." class="input-elegant" required></textarea>
                </div>
            </div>

            <div class="text-center pt-10">
                <button type="submit" class="gold-button font-bold py-5 px-20 rounded-xl shadow-lg hover:shadow-2xl transition-all text-lg tracking-wide">
                    إرسال البيانات الآن
                </button>
            </div>
        </form>

        <!-- قسم النجاح المشرق -->
        <div id="successSection" class="text-center py-24 white-card rounded-3xl border-2 border-green-100">
            <div class="w-20 h-20 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <span class="text-4xl">✨</span>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-3">شكرًا لك.. تم استلام بياناتك</h2>
            <p class="text-gray-500">تم حفظ إجاباتك بنجاح في قاعدة بيانات ليالي الطيبين.</p>
        </div>
    </div>

    <script>
        var submitted = false;
        function showSuccess() {
            document.getElementById('auditForm').style.display = 'none';
            document.getElementById('successSection').style.display = 'block';
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
