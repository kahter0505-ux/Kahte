<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استمارة تشخيص واقع ليالي الطيبين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #e6edf3; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .glass-card { background: rgba(22, 27, 34, 0.8); border: 1px solid #30363d; border-radius: 12px; }
        .input-field { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; transition: 0.3s; }
        .input-field:focus { border-color: #58a6ff; outline: none; box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1); }
        .label-gold { color: #d29922; font-weight: 600; font-size: 0.9rem; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <!-- الرأس -->
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-yellow-500 mb-2">استمارة تشخيص الواقع</h1>
            <p class="text-gray-400 text-sm italic underline">ليالي الطيبين - الاستراتيجية الرقمية</p>
        </div>

        <!-- بداية النموذج -->
        <form action="https://docs.google.com/forms/d/e/1FAIpQLSfZ-RGGrG_bAfda3yca-sM9ZIFG6JGIHcQz16lWuRMvN87Egw/formResponse" method="POST" target="_self">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <!-- سؤال 1 -->
                <div class="glass-card p-6">
                    <label class="label-gold mb-3 block">1. مؤشر النجاح المالي بعد 60 يوماً:</label>
                    <select name="entry.XXXXX1" class="input-field w-full p-3 rounded-lg">
                        <option value="نمو المبيعات اليومية">نمو المبيعات اليومية</option>
                        <option value="استقطاب زبائن جدد">استقطاب زبائن جدد</option>
                        <option value="تصدر تطبيقات التوصيل">تصدر تطبيقات التوصيل</option>
                    </select>
                </div>

                <!-- سؤال 2 -->
                <div class="glass-card p-6">
                    <label class="label-gold mb-3 block">2. العائق التشغيلي الأكبر:</label>
                    <input type="text" name="entry.XXXXX2" class="input-field w-full p-3 rounded-lg" placeholder="مثلاً: العمالة أو الجودة">
                </div>

                <!-- سؤال 3 -->
                <div class="glass-card p-6">
                    <label class="label-gold mb-3 block">3. الميزانية التسويقية الشهرية:</label>
                    <input type="text" name="entry.XXXXX3" class="input-field w-full p-3 rounded-lg" placeholder="حدد المبلغ التقريبي">
                </div>

                <!-- سؤال 4 -->
                <div class="glass-card p-6">
                    <label class="label-gold mb-3 block">4. المنتج الأعلى طلباً (النجم):</label>
                    <input type="text" name="entry.XXXXX4" class="input-field w-full p-3 rounded-lg" placeholder="اسم الصنف">
                </div>

                <!-- سؤال 5 (عريض) -->
                <div class="glass-card p-6 md:col-span-2">
                    <label class="label-gold mb-3 block">5. ملاحظات إضافية حول السمعة الرقمية:</label>
                    <textarea name="entry.XXXXX5" rows="3" class="input-field w-full p-3 rounded-lg" placeholder="اكتب مرئياتك هنا..."></textarea>
                </div>

            </div>

            <!-- زر الإرسال المميز -->
            <div class="mt-10 text-center">
                <button type="submit" class="bg-gradient-to-r from-orange-500 to-yellow-600 hover:from-orange-600 hover:to-yellow-700 text-white font-bold py-3 px-12 rounded-full shadow-lg transform transition hover:scale-105">
                    🚀 ارسال كافة البيانات للاعتماد
                </button>
            </div>
        </form>
    </div>

</body>
</html>
