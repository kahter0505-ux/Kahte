<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الطريق للتسويق | تحليل احترافي</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Tajawal', sans-serif;
    background: linear-gradient(135deg,#eef2ff,#f8fafc);
}

.wrapper {
    max-width: 750px;
    margin: auto;
    padding: 20px;
}

.main-title {
    color: #4f46e5;
    font-weight: 900;
}

.question-card {
    background: white;
    border-radius: 20px;
    padding: 25px;
    margin-bottom: 25px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    border-top: 6px solid #4f46e5;
}

.choice-item {
    display: flex;
    align-items: center;
    padding: 15px;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    margin-top: 10px;
    cursor: pointer;
    transition: .2s;
}

.choice-item:hover {
    border-color: #4f46e5;
    background: #eef2ff;
}

.choice-item.selected {
    border-color: #4f46e5;
    background: #eef2ff;
}

input[type="radio"] {
    margin-left: 10px;
    accent-color: #4f46e5;
}

.input-text {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 2px solid #e5e7eb;
    margin-top: 10px;
}

.input-text:focus {
    border-color: #4f46e5;
    outline: none;
}

.btn-submit {
    width: 100%;
    padding: 18px;
    border-radius: 15px;
    font-size: 18px;
    font-weight: bold;
    background: #1e293b;
    color: white;
    transition: .3s;
}

.btn-submit:hover {
    background: #4f46e5;
}

.progress-bar {
    background: #e5e7eb;
    border-radius: 10px;
    margin-bottom: 20px;
}

.progress {
    height: 10px;
    width: 0%;
    background: #4f46e5;
    border-radius: 10px;
    transition: .3s;
}

#success {
    display: none;
    text-align: center;
    padding: 100px;
}
</style>

</head>

<body>

<div class="wrapper" id="formBody">

<h1 class="text-3xl text-center main-title mb-6">تحليل المطعم التسويقي</h1>

<div class="progress-bar">
    <div id="progress" class="progress"></div>
</div>

<iframe name="hidden_iframe" style="display:none;" onload="done()"></iframe>

<form id="form"
action="https://docs.google.com/forms/d/e/1FAIpQLSfZ-RGGrG_bAfda3yca-sM9ZIFG6JGIHcQz16lWuRMvN87Egw/formResponse"
method="POST"
target="hidden_iframe">

<!-- 1 -->
<div class="question-card">
<p>ما هو المؤشر الحقيقي للنجاح؟</p>

<label class="choice-item">
<input type="radio" name="entry.1099859393" required>
نمو المبيعات
</label>

<label class="choice-item">
<input type="radio" name="entry.1099859393">
عملاء جدد
</label>
</div>

<!-- 2 -->
<div class="question-card">
<p>العائق الأكبر؟</p>

<label class="choice-item">
<input type="radio" name="entry.1095069852" required>
الموردين
</label>

<label class="choice-item">
<input type="radio" name="entry.1095069852">
التكاليف
</label>
</div>

<!-- 3 -->
<div class="question-card">
<p>الميزانية؟</p>

<label class="choice-item">
<input type="radio" name="entry.1005025151" required>
أقل من 2000
</label>

<label class="choice-item">
<input type="radio" name="entry.1005025151">
2000 - 5000
</label>
</div>

<!-- 4 -->
<div class="question-card">
<p>نجم المطعم</p>
<input type="text" name="entry.1276136133" class="input-text" required>
</div>

<!-- 5 (تم تصحيحها) -->
<div class="question-card">
<p>جودة الخدمة</p>

<label class="choice-item">
<input type="radio" name="entry.997508088" value="ضعيفة" required> ضعيفة
</label>

<label class="choice-item">
<input type="radio" name="entry.997508088" value="جيدة"> جيدة
</label>

<label class="choice-item">
<input type="radio" name="entry.997508088" value="ممتازة"> ممتازة
</label>
</div>

<button id="submitBtn" disabled class="btn-submit opacity-50">
إرسال البيانات
</button>

</form>

</div>

<div id="success">
<h1 class="text-4xl">✅ تم الإرسال</h1>
<p>شكراً لك</p>
</div>

<script>

let form = document.getElementById("form");
let btn = document.getElementById("submitBtn");
let progress = document.getElementById("progress");

let total = 5;

form.addEventListener("change", () => {

    let filled = 0;

    document.querySelectorAll("input[required]").forEach(el => {
        if(el.type === "radio"){
            let name = el.name;
            if(document.querySelector(`input[name="${name}"]:checked`)){
                filled++;
            }
        } else if(el.value){
            filled++;
        }
    });

    progress.style.width = (filled / total) * 100 + "%";

    if(form.checkValidity()){
        btn.disabled = false;
        btn.classList.remove("opacity-50");
    }
});

document.querySelectorAll('.choice-item').forEach(item => {
    item.addEventListener('click', () => {
        let group = item.parentElement;
        group.querySelectorAll('.choice-item').forEach(i => i.classList.remove('selected'));
        item.classList.add('selected');
    });
});

function done(){
    document.getElementById("formBody").style.display = "none";
    document.getElementById("success").style.display = "block";
}

</script>

</body>
</html>
